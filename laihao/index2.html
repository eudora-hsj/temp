<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
	  * { margin: 0; padding: 0; box-sizing: border-box; }
	  
	  body {
		  background-color: #fff;
	  }
	  
	  .service-section {
		  position: relative;
		  width: 100%;
		  min-height: 800px;
		  padding: 120px 0;
		  display: flex;
		  flex-direction: column;
		  align-items: center;
		  overflow: hidden;
	  }
	  
	  .wave-background {
		  position: absolute;
		  inset: 0; /* 確保上下左右都撐滿 */
		  z-index: -1;
	  }
	  
	  svg {
		  width: 100%;
		  height: 100%;
		  display: block;
	  }
	  
  </style>
</head>
<body>

<section class="service-section">
  <div class="wave-background">
    <svg viewBox="0 0 1440 800" preserveAspectRatio="none">
      <path id="wave-back" fill="#f4eee4" opacity="0.6"
            d="M0,80 C360,180 450,0 720,80 C990,160 1080,0 1440,80 V800 H0 Z" />
    </svg>
  </div>
